# Truss config — Baseten vLLM pool on a PROVEN-SCHEDULABLE single-GPU SKU.
# 4th dedicated attempt, 2026-07-02. Lessons from the three failures applied:
#   - T4x8x32: the GPU family that PROVED schedulable here (deployment-2
#     scheduled in minutes; FRICTION #6 was the 2-GPU L4 node) but with 32 GiB
#     host RAM — double the 16 GiB that host-OOM'd T4x4x16 (FRICTION #7).
#     16 GiB VRAM fits AWQ Qwen3-8B (~6 GiB) + KV at 4k ctx. $0.01504/min.
#     (A10Gx8x32 was attempt 4a: org-gated, rejected at push — FRICTION #13.)
#     https://docs.baseten.co/deployment/resources
#   - Custom Truss + vLLM (docker build, no engine compile) sidesteps the
#     Engine-Builder BUILD_FAILED class entirely (FRICTION #12); this exact
#     model.py was validated against BasetenAdapter in session 1.
model_name: qwen3-8b-vllm
description: "ai-native-pipeline vLLM pool — OpenAI-compat chat via custom Truss"
python_version: py311
model_metadata:
  tier: realtime
  target: gpu
  engine: vllm-truss
requirements:
  - vllm==0.9.1
  # vllm 0.9.1 import-crashes with transformers>=4.54 ('aimv2' config name
  # collision in its Ovis shim, seen live on q86yjdy — FRICTION #14): the
  # floating transitive dep must be pinned to the era vllm 0.9.1 shipped in.
  - transformers==4.53.2
  - huggingface_hub
resources:
  instance_type: "T4x8x32"
  use_gpu: true
runtime:
  predict_concurrency: 4
environment_variables:
  MODEL_ID: Qwen/Qwen3-8B-AWQ
  MAX_MODEL_LEN: "4096"     # T4 16 GiB VRAM: AWQ weights + KV headroom
  QUANTIZATION: awq
  DTYPE: float16            # AWQ kernels want fp16
