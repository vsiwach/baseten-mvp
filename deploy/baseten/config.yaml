# Corrected 2026-07-02 after BUILD_FAILED on deployment qz47j5o (see deploy/baseten/DEBUG.md).
# Changes vs the failed config, each grounded in docs.baseten.co:
#   1. resources: cpu '1'/10Gi -> '2'/20Gi. The docs' own Engine-Builder examples give
#      10Gi only to 3B models (20Gi for 32B, 40Gi for 70B), and the documented fix for
#      build-job CPU-memory OOM is "add more memory in the `resources` section".
#      https://docs.baseten.co/engines/engine-builder-llm/engine-builder-config
#      https://docs.baseten.co/reference/truss-configuration  (num_builder_gpus note)
#   2. Removed python_version: py313 — no Engine-Builder-LLM (v1) example sets
#      python_version at all; the engine build supplies its own image.
#      https://docs.baseten.co/engines/engine-builder-llm/engine-builder-config
#   3. Added max_batch_size 256 ("Keep this at 256."), max_num_tokens 8192
#      ("Recommended: 8192 or 16384."), plugin_configuration (production
#      recommendation; use_fp8_context_fmha requires fp8_kv — satisfied), and the
#      quantization_config calibration block present in every documented fp8_kv example.
#      https://docs.baseten.co/engines/engine-builder-llm/engine-builder-config
#   4. Kept fp8_kv on H100: valid for Qwen3 (the FP8_KV bias caveat is Qwen2/2.5-only)
#      and H100 supports FP8_KV per the GPU matrix.
#      https://docs.baseten.co/engines/performance-concepts/quantization-guide
#   5. Instance target stays single H100, TP1 — the docs' recommendation for 8B-30B
#      dense models ("8B-30B | H100, B200 | TP1 | H100"; "4000 tokens/s per request on
#      Qwen-3-8B with a single H100"). H100 = $0.10833/min, 16 vCPU, 118 GiB RAM.
#      https://docs.baseten.co/engines/engine-builder-llm/overview
#      https://docs.baseten.co/deployment/resources
model_name: qwen3-8b-pool
model_metadata:
  tags:
    - openai-compatible
resources:
  accelerator: H100
  cpu: '2'
  memory: 20Gi
  use_gpu: true
trt_llm:
  build:
    base_model: decoder
    checkpoint_repository:
      source: HF
      repo: Qwen/Qwen3-8B
      revision: main
    max_seq_len: 8192
    max_batch_size: 256
    max_num_tokens: 8192
    quantization_type: fp8_kv
    tensor_parallel_count: 1
    plugin_configuration:
      paged_kv_cache: true
      use_paged_context_fmha: true
      use_fp8_context_fmha: true
    quantization_config:
      calib_size: 1024
      calib_dataset: "abisee/cnn_dailymail"
      calib_max_seq_length: 2048
  runtime:
    kv_cache_free_gpu_mem_fraction: 0.9
    enable_chunked_context: true
    batch_scheduler_policy: guaranteed_no_evict
    served_model_name: qwen3-8b
