name: deploy-demo-pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (demo board at /, evidence replay at /replay)
        run: |
          mkdir -p _site/replay
          cp -r demo/* _site/
          rm -f _site/vercel.json
          cp demo/devboard.html _site/index.html
          cp site/index.html site/replay-data.js _site/replay/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
