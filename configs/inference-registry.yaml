# Backend registry — the router's model catalog. Hand-maintained in this
# repo (plain config, one entry per servable model). LLM SLO fields:
# tier picks the SLO row in routing-policy.yaml; engine picks the adapter.
backends:
  # The flagship pool: open-weight Qwen3-8B (AWQ int4) on a dedicated
  # Baseten T4 (deploy/baseten/vllm-truss), spilling to the Model APIs.
  qwen3-8b:
    tier: interactive       # T4+8B holds interactive (TTFT<800ms), not voice
    target: gpu
    engine: vllm
    model_id: Qwen/Qwen3-8B-AWQ
    cold_start_s: 360.0     # measured 2026-07-02 (weights from HF; no BDN yet)
    kv_ttl_s: 300.0
    max_replicas: 2
    scale_to_zero: true

  # Baseten hosted Model APIs — one catalog mux pool serves every alias
  # below (deploy/baseten/model-apis.json, refreshed by
  # `python3 deploy/baseten/manage.py catalog`). Serverless: always warm,
  # per-token billed, standard tier.
  deepseek-v4-pro:
    tier: standard
    target: gpu
    engine: baseten-api
    model_id: deepseek-ai/DeepSeek-V4-Pro
    cold_start_s: 0.5
    kv_ttl_s: 300.0
    max_replicas: 2
    scale_to_zero: false
